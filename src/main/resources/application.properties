# WebSocket Configuration
ccc.websocket.max-text-message-buffer-size=102400
ccc.websocket.max-binary-message-buffer-size=8192

# Message Accumulator Configuration
ccc.accumulator.timeout-seconds=30
ccc.accumulator.max-size=1048576

# Kubernetes Probes (auch lokal aktivieren, damit Namenskonflikte früh auffallen)
management.endpoint.health.probes.enabled=true
