# WebSocket Configuration
ccc.websocket.max-text-message-buffer-size=102400
ccc.websocket.max-binary-message-buffer-size=8192
ccc.websocket.connect-msg-max-delay-seconds=10

# Message Accumulator Configuration
ccc.accumulator.timeout-seconds=30
ccc.accumulator.max-size=1048576

# Security Limiters (set to false to disable)
ccc.security.connection-limiter.enabled=false
ccc.security.rate-limiter.enabled=false

# Smoke Test
# ccc.smoke.url=wss://defineWebsocketUrlHereIfNeeded

# Kubernetes Probes (auch lokal aktivieren, damit Namenskonflikte früh auffallen)
management.endpoint.health.probes.enabled=true
management.endpoint.health.group.liveness.include=livenessState,websocket
management.endpoint.health.group.liveness.show-details=always
management.endpoint.health.group.readiness.include=readinessState,cccReadiness
management.endpoint.health.group.readiness.show-details=always

# Graceful Shutdown for Kubernetes Rolling Updates
# Allows WebSocket connections to be closed cleanly when pod receives SIGTERM
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=20s
