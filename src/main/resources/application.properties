# WebSocket Configuration
ccc.websocket.max-text-message-buffer-size=102400
ccc.websocket.max-binary-message-buffer-size=8192

# Maximum seconds a new WebSocket connection may wait for the first Connect message.
# Default: 2
# ccc.websocket.connect-msg-max-delay-seconds=2

# Period (seconds) Tomcat's background thread scans WebSocket sessions for
# expired idle timeouts. Tomcat's default is 10s, which means a maxIdleTimeout
# of e.g. 2s is enforced anywhere between 2-12s. Lowering this to 1s makes
# short pre-Connect timeouts behave as configured.
ccc.websocket.idle-check-period-seconds=1

# Message Accumulator Configuration
ccc.accumulator.timeout-seconds=30
ccc.accumulator.max-size=1048576

# Security Limiters (set to false to disable)
ccc.security.connection-limiter.enabled=false
ccc.security.rate-limiter.enabled=false

# Global session cap. 0 = unlimited.
# When the cap is reached, new Connect messages that would create a NEW session
# are rejected with WebSocket close status SERVICE_OVERLOAD (1013).
# Reconnects and the second client joining an existing session are not affected.
ccc.security.max-sessions=200

# Tomcat / embedded server limits.
# Bound the resources an incoming connection storm can consume even when the
# upstream SES rate limiter fails or is bypassed.
# max-connections: maximum simultaneously accepted connections (HTTP + WebSocket)
# threads.max: worker threads handling requests; CCC is I/O-bound, 50 is plenty
# accept-count: OS socket backlog once threads are saturated
# connection-timeout: time the server waits for the HTTP request line / handshake
server.tomcat.max-connections=400
server.tomcat.threads.max=50
server.tomcat.accept-count=20
server.tomcat.connection-timeout=10s

# Smoke Test
# ccc.smoke.url=ws://localhost:8080/ccc-service

# Kubernetes Probes (auch lokal aktivieren, damit Namenskonflikte früh auffallen)
management.endpoint.health.probes.enabled=true
management.endpoint.health.group.liveness.include=livenessState,websocket
management.endpoint.health.group.liveness.show-details=always
management.endpoint.health.group.readiness.include=readinessState,cccReadiness
management.endpoint.health.group.readiness.show-details=always

# Graceful Shutdown for Kubernetes Rolling Updates
# Allows WebSocket connections to be closed cleanly when pod receives SIGTERM
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=20s
