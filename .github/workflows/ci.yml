name: CI

on:
  push:
    branches: [ master, umweltplus_fix ]
    paths-ignore:
      - '**/*.md'
  pull_request:
    branches: [ master, umweltplus_fix ]
    paths-ignore:
      - '**/*.md'
  workflow_call:
    inputs:
      release_tag:
        description: 'Release tag for Docker image'
        required: false
        type: string

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 25
      uses: actions/setup-java@v4
      with:
        java-version: 25
        distribution: temurin
    - name: Code quality checks
      run: ./gradlew spotbugsMain spotbugsTest
    - name: Run tests
      run: ./gradlew test
    - name: Run integration tests
      run: ./gradlew integrationTest

  release:
    if: inputs.release_tag != ''
    needs: test
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 25
      uses: actions/setup-java@v4
      with:
        java-version: 25
        distribution: temurin
    - name: Build ccc-service.jar
      run: ./gradlew assemble
    - name: Docker login
      env:
        CCC_DOCKER_USER: ${{ secrets.CCC_DOCKER_USER }}
        CCC_DOCKER_PASS: ${{ secrets.CCC_DOCKER_PASS }}
      run: echo "$CCC_DOCKER_PASS" | docker login -u "$CCC_DOCKER_USER" --password-stdin
    - name: Build and test image
      run: ./gradlew testImage
      env:
        RELEASE_TAG: ${{ inputs.release_tag }}
    - name: Push image to Docker Hub
      run: ./gradlew pushImage
      env:
        RELEASE_TAG: ${{ inputs.release_tag }}
